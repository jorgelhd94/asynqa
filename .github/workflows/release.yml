name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from wails.json
        id: tag
        run: |
          VERSION=$(grep -o '"productVersion": *"[^"]*"' wails.json | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.exists == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: asynqa.exe
            asset: asynqa_windows_amd64.zip
            nsis: true
            build-tags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            output: asynqa
            asset: asynqa_linux_amd64.tar.gz
            nsis: false
            build-tags: webkit2_41
          - os: macos-latest
            platform: darwin/universal
            output: asynqa
            asset: asynqa_darwin_universal.tar.gz
            nsis: false
            build-tags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: matrix.nsis
        run: choco install nsis -y
        shell: pwsh

      - name: Build
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build-tags && format('-tags {0}', matrix.build-tags) }} -ldflags "-X main.version=${{ needs.version.outputs.tag }}"

      - name: Build NSIS installer
        if: matrix.nsis
        run: wails build -platform ${{ matrix.platform }} -nsis -ldflags "-X main.version=${{ needs.version.outputs.tag }}"

      - name: Package (Windows portable)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/bin/${{ matrix.output }} -DestinationPath ${{ matrix.asset }}
        shell: pwsh

      - name: Upload portable artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload NSIS installer
        if: matrix.nsis
        uses: actions/upload-artifact@v4
        with:
          name: asynqa_windows_amd64_installer.exe
          path: build/bin/*-amd64-installer.exe

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset }} -C build/bin ${{ matrix.output }}

      - name: Upload artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: AsynQA ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          prerelease: true
          files: artifacts/*
